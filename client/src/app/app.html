<header class="site-header">
  <a class="brand" routerLink="/">Licious Hair Empire</a>
  <nav>
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">Shop</a>
    <a routerLink="/cart" routerLinkActive="active" class="cart-link">Cart ({{ cartService.itemCount() }})</a>

    @if (authService.isLoggedIn()) {
      <a routerLink="/account/orders" routerLinkActive="active" class="nav-link">My Orders</a>
      @if (authService.isAdmin()) {
        <a routerLink="/admin" routerLinkActive="active" class="nav-link admin-link">Admin</a>
      }
      <span class="user-name">Hi, {{ firstName() }}</span>
      <button type="button" class="nav-btn" (click)="authService.logout()">Sign Out</button>
    } @else {
      <a routerLink="/login" routerLinkActive="active">Sign In</a>
    }
  </nav>
</header>

<main>
  <router-outlet />
</main>

<footer class="site-footer">
  <p>&copy; {{ currentYear }} Licious Hair Empire. All rights reserved.</p>
</footer>
